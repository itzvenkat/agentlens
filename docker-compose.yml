services:
  postgres:
    image: postgres:16-alpine
    container_name: agentlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-agentlens}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentlens_dev_2026}
      POSTGRES_DB: ${DB_DATABASE:-agentlens_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agentlens} -d ${DB_DATABASE:-agentlens_dev}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentlens-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agentlens-api
    restart: unless-stopped
    env_file:
      - .env.${NODE_ENV:-development}
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: agentlens-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
    ports:
      - "${DASHBOARD_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
