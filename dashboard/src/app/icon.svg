<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#09090b" />
            <stop offset="100%" stop-color="#18181b" />
        </linearGradient>
        <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
        <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ec4899" />
            <stop offset="100%" stop-color="#8b5cf6" />
        </linearGradient>
        <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#2dd4bf" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base rounded rect for app icon feel -->
    <rect width="512" height="512" rx="128" fill="url(#bg)" />
    
    <!-- Outer orbiting rings for "Agentic" feel -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring1)" stroke-width="24" stroke-dasharray="240 120" stroke-linecap="round" transform="rotate(-45 256 256)" />
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring2)" stroke-width="24" stroke-dasharray="180 180" stroke-linecap="round" transform="rotate(135 256 256)" />

    <!-- Inner Lens shape for "Lens" -->
    <path d="M 140 256 C 180 180, 332 180, 372 256 C 332 332, 180 332, 140 256 Z" fill="none" stroke="url(#ring1)" stroke-width="28" stroke-linejoin="round" />
    
    <!-- Glowing core -> observing/analytics -->
    <circle cx="256" cy="256" r="48" fill="url(#core)" filter="url(#glow)" />
    <circle cx="244" cy="244" r="12" fill="#ffffff" opacity="0.9" />
</svg>
